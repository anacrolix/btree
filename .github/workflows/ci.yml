name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on HEAD
        run: go test -bench=. -benchmem -count=6 -run='^$' ./bench/ | tee "$GITHUB_WORKSPACE/new.txt"

      - name: Run benchmarks on HEAD~1
        run: |
          git checkout HEAD~1
          if [ -d bench ]; then
            go test -bench=. -benchmem -count=6 -run='^$' ./bench/ | tee "$GITHUB_WORKSPACE/old.txt"
          else
            echo "bench directory not present on parent commit" | tee "$GITHUB_WORKSPACE/old.txt"
          fi
          git checkout -

      - name: Compare benchmarks
        run: benchstat "$GITHUB_WORKSPACE/old.txt" "$GITHUB_WORKSPACE/new.txt"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            ${{ github.workspace }}/old.txt
            ${{ github.workspace }}/new.txt
