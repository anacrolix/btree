name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./...
      - name: Run bench module tests
        working-directory: bench
        run: go test ./...

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version-file: bench/go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on HEAD
        working-directory: bench
        run: go test -bench=. -benchmem -count=6 -run='^$' ./... | tee "$GITHUB_WORKSPACE/new.txt"

      - name: Run benchmarks on HEAD~1
        run: |
          git checkout HEAD~1
          if [ -d bench ]; then
            cd bench
            go test -bench=. -benchmem -count=6 -run='^$' ./... | tee "$GITHUB_WORKSPACE/old.txt"
          else
            echo "bench directory not present on parent commit" | tee "$GITHUB_WORKSPACE/old.txt"
          fi
          git checkout -

      - name: Compare benchmarks
        run: benchstat "$GITHUB_WORKSPACE/old.txt" "$GITHUB_WORKSPACE/new.txt"

      - name: Generate chart
        working-directory: bench
        run: |
          mkdir -p "$GITHUB_WORKSPACE/pages"
          go run ./cmd/benchchart < "$GITHUB_WORKSPACE/new.txt" > "$GITHUB_WORKSPACE/pages/index.html"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            ${{ github.workspace }}/old.txt
            ${{ github.workspace }}/new.txt
            ${{ github.workspace }}/pages/index.html

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/pages

  deploy-pages:
    name: Deploy chart to GitHub Pages
    needs: bench
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
